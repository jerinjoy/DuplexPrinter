name: DuplexPrinter
options:
  bundleIdPrefix: com.joy
  deploymentTarget:
    macOS: 11.0

targets:
  DuplexPrinter:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        LSMinimumSystemVersion: 11.0
        CFBundleShortVersionString: 1.0
        CFBundleVersion: 1
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: Sources/DuplexPrinter.entitlements

